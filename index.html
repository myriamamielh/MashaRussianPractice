<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masha's Russian Practice</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            color: #18181b;
            margin: 0;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <script type="text/babel">
        // --- Setup ---
        const { useState, useEffect, useCallback, useMemo, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;
        
        // Safely get icons from LucideReact global
        const getIcon = (name) => {
            const Icon = LucideReact[name] || LucideReact.HelpCircle;
            return (props) => <Icon {...props} />;
        };

        const Icons = {
            BookOpen: getIcon('BookOpen'),
            ChevronRight: getIcon('ChevronRight'),
            RotateCcw: getIcon('RotateCcw'),
            Trophy: getIcon('Trophy'),
            Loader2: getIcon('Loader2'),
            Keyboard: getIcon('Keyboard'),
            CheckCircle2: getIcon('CheckCircle2'),
            ArrowLeft: getIcon('ArrowLeft'),
            Flame: getIcon('Flame'),
            Medal: getIcon('Medal'),
            Star: getIcon('Star'),
            Heart: getIcon('Heart'),
            XCircle: getIcon('XCircle'),
            HelpCircle: getIcon('HelpCircle'),
            MessageCircle: getIcon('MessageCircle'),
            Send: getIcon('Send'),
            Settings: getIcon('Settings'),
            Book: getIcon('Book')
        };

        // --- Constants ---
        const ALL_TOPICS = [
            'Common Verbs (Grammar List)', 'Accusative Case', 'Motion Verbs', 'Genitive Case',
            'Dative Case', 'Past Tense', 'Numbers & Time', 'Greetings & Phrases',
            'Aspect (Perfective/Imperfective)', 'Instrumental Case', 'Prepositional Case', 'Adjectives Declension'
        ];

        const BADGES = [
            { id: 'first_step', name: 'First Step', icon: 'Star', color: 'text-yellow-500', bg: 'bg-yellow-50' },
            { id: 'explorer', name: 'Explorer', icon: 'Medal', color: 'text-blue-500', bg: 'bg-blue-50' },
            { id: 'master', name: 'Master', icon: 'Trophy', color: 'text-orange-500', bg: 'bg-orange-50' },
            { id: 'dedicated', name: 'Dedicated', icon: 'Flame', color: 'text-red-500', bg: 'bg-red-50' },
        ];

        const RUSSIAN_KEYS = [
            ['Ё', 'Й', 'Ц', 'У', 'К', 'Е', 'Н', 'Г', 'Ш', 'Щ', 'З', 'Х', 'Ъ'],
            ['Ф', 'Ы', 'В', 'А', 'П', 'Р', 'О', 'Л', 'Д', 'Ж', 'Э'],
            ['Я', 'Ч', 'С', 'М', 'И', 'Т', 'Ь', 'Б', 'Ю']
        ];

        // --- AI Logic ---
        // Dynamically import Gemini SDK
        let GoogleGenAI;
        import('https://esm.run/@google/genai').then(mod => {
            GoogleGenAI = mod.GoogleGenAI;
        });

        async function generateExercises(topic, apiKey) {
            if (!GoogleGenAI) throw new Error("AI SDK loading...");
            const genAI = new GoogleGenAI(apiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const prompt = `Generate 3 Russian exercises on "${topic}". Return ONLY a JSON array of objects with: type (multiple-choice, gap-fill, translation, writing), level (A1-B1), question, correctAnswer, explanation, fullTranslation, wordHints (array of {word, translation}).`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            const text = response.text();
            return JSON.parse(text.replace(/```json|```/g, ''));
        }

        async function askMasha(question, exercise, userAnswer, history, apiKey) {
            if (!GoogleGenAI) throw new Error("AI SDK loading...");
            const genAI = new GoogleGenAI(apiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const prompt = `You are Masha, a Russian tutor. Help with this exercise: ${JSON.stringify(exercise)}. Student says: "${question}". Current answer: "${userAnswer}". History: ${JSON.stringify(history)}. Be concise and encouraging.`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            return response.text();
        }

        // --- UI Components ---
        const cn = (...classes) => classes.filter(Boolean).join(' ');

        const RussianKeyboard = ({ onKeyPress, onBackspace }) => (
            <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100 shadow-inner">
                <div className="flex flex-col gap-2">
                    {RUSSIAN_KEYS.map((row, i) => (
                        <div key={i} className="flex justify-center gap-1">
                            {row.map(key => (
                                <button key={key} onClick={() => onKeyPress(key.toLowerCase())} className="w-10 h-12 bg-white border border-orange-200 rounded-lg shadow-sm active:translate-y-0.5 font-medium hover:bg-orange-100/50">{key}</button>
                            ))}
                        </div>
                    ))}
                    <div className="flex justify-center gap-1 mt-1">
                        <button onClick={() => onKeyPress(' ')} className="flex-1 h-12 bg-white border border-orange-200 rounded-lg shadow-sm font-medium">Space</button>
                        <button onClick={onBackspace} className="w-20 h-12 bg-orange-100 border border-orange-200 rounded-lg shadow-sm font-medium text-orange-800">⌫</button>
                    </div>
                </div>
            </div>
        );

        const GrammarTable = ({ title, headers, rows }) => (
            <div className="mb-12 overflow-hidden rounded-2xl border border-orange-100 shadow-sm bg-white">
                <div className="bg-orange-600 px-6 py-4"><h3 className="text-lg font-bold text-white">{title}</h3></div>
                <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left">
                        <thead className="bg-zinc-800 text-white uppercase text-[10px] tracking-widest font-bold">
                            <tr>{headers.map((h, i) => <th key={i} className="px-4 py-3 border-r border-zinc-700 last:border-0">{h}</th>)}</tr>
                        </thead>
                        <tbody>
                            {rows.map((row, i) => (
                                <tr key={i} className={cn("border-b border-zinc-100 last:border-0", row.colorClass)}>
                                    <td className="px-4 py-3 font-bold border-r border-zinc-100">{row.category}</td>
                                    <td className="px-4 py-3 font-mono text-orange-700 border-r border-zinc-100">{row.rule}</td>
                                    <td className="px-4 py-3 text-zinc-800 border-r border-zinc-100">{row.example}</td>
                                    <td className="px-4 py-3 font-medium">{row.usage}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const ExerciseCard = ({ exercise, userAnswer, onAnswerChange, isSubmitted, isCorrect, apiKey }) => {
            const [chatHistory, setChatHistory] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const [isChatLoading, setIsChatLoading] = useState(false);
            const [showChat, setShowChat] = useState(false);

            const handleSendChat = async () => {
                if (!chatInput.trim() || isChatLoading) return;
                const msg = { role: 'user', text: chatInput };
                setChatHistory(prev => [...prev, msg]);
                setChatInput('');
                setIsChatLoading(true);
                try {
                    const res = await askMasha(chatInput, exercise, userAnswer, chatHistory, apiKey);
                    setChatHistory(prev => [...prev, { role: 'model', text: res }]);
                } catch (e) { console.error(e); } finally { setIsChatLoading(false); }
            };

            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-zinc-100">
                    <div className="flex justify-between mb-4">
                        <div className="flex gap-2">
                            <span className="px-2 py-0.5 bg-orange-100 text-orange-700 text-[10px] font-bold rounded-full uppercase">{exercise.type}</span>
                            <span className="px-2 py-0.5 bg-zinc-100 text-zinc-600 text-[10px] font-bold rounded-full uppercase">Level {exercise.level}</span>
                        </div>
                        {isSubmitted && <button onClick={() => setShowChat(!showChat)} className="text-orange-600 text-sm font-bold flex items-center gap-1"><Icons.MessageCircle className="w-4 h-4"/> Ask Masha</button>}
                    </div>
                    
                    <div className="text-xl font-semibold mb-4">{exercise.question}</div>
                    
                    {exercise.type === 'multiple-choice' ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            {exercise.options?.map(opt => (
                                <button key={opt} disabled={isSubmitted} onClick={() => onAnswerChange(opt)} className={cn("p-4 text-left border-2 rounded-xl font-medium", userAnswer === opt ? "border-orange-600 bg-orange-50" : "border-zinc-100", isSubmitted && opt === exercise.correctAnswer && "border-emerald-500 bg-emerald-50")}>{opt}</button>
                            ))}
                        </div>
                    ) : (
                        <div className="relative">
                            <input type="text" value={userAnswer} onChange={e => onAnswerChange(e.target.value)} placeholder="Type in Russian..." className={cn("w-full p-4 border-2 rounded-xl focus:outline-none", isSubmitted ? (isCorrect ? "border-emerald-500 bg-emerald-50" : "border-rose-500 bg-rose-50") : "border-zinc-200 focus:border-orange-500")} />
                            {isSubmitted && <div className="absolute right-4 top-1/2 -translate-y-1/2">{isCorrect ? <Icons.CheckCircle2 className="text-emerald-500 w-6 h-6"/> : <Icons.XCircle className="text-rose-500 w-6 h-6"/>}</div>}
                        </div>
                    )}

                    {isSubmitted && (
                        <div className="mt-6 space-y-4">
                            {!isCorrect && <div className="p-3 bg-emerald-50 text-emerald-800 rounded-lg text-sm"><b>Correct:</b> {exercise.correctAnswer}</div>}
                            {exercise.fullTranslation && <div className="p-4 bg-orange-50 rounded-xl border border-orange-100 text-sm italic">{exercise.fullTranslation}</div>}
                            {showChat && (
                                <div className="mt-6 border-t pt-6">
                                    <div className="space-y-4 max-h-48 overflow-y-auto mb-4">
                                        {chatHistory.map((m, i) => <div key={i} className={cn("p-3 rounded-2xl text-sm max-w-[80%]", m.role === 'user' ? "ml-auto bg-orange-600 text-white" : "bg-zinc-100")}>{m.text}</div>)}
                                        {isChatLoading && <Icons.Loader2 className="w-4 h-4 animate-spin mx-auto"/>}
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSendChat()} className="flex-1 p-3 bg-zinc-50 border rounded-xl text-sm" placeholder="Ask Masha..." />
                                        <button onClick={handleSendChat} className="p-3 bg-orange-600 text-white rounded-xl"><Icons.Send className="w-4 h-4"/></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Main App ---
        function App() {
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('masha_api_key') || '');
            const [showSettings, setShowSettings] = useState(!apiKey);
            const [activeTab, setActiveTab] = useState('practice');
            const [quiz, setQuiz] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [stats, setStats] = useState(() => JSON.parse(localStorage.getItem('masha_stats') || '{"streak":0,"totalTests":0,"badges":[]}'));

            useEffect(() => { localStorage.setItem('masha_stats', JSON.stringify(stats)); }, [stats]);

            const startQuiz = async (topic) => {
                setIsLoading(true);
                try {
                    const ex = await generateExercises(topic, apiKey);
                    setQuiz({ topic, exercises: ex, currentIndex: 0, score: 0, answers: {} });
                } catch (e) { alert("Error starting quiz. Check API key."); }
                finally { setIsLoading(false); }
            };

            const handleNext = () => {
                const isCorrect = quiz.answers[quiz.currentIndex]?.toLowerCase().trim() === quiz.exercises[quiz.currentIndex].correctAnswer.toLowerCase().trim();
                const newScore = isCorrect ? quiz.score + 1 : quiz.score;
                
                if (quiz.currentIndex < quiz.exercises.length - 1) {
                    setQuiz({...quiz, currentIndex: quiz.currentIndex + 1, score: newScore});
                    setIsSubmitted(false);
                } else {
                    setStats(prev => ({...prev, totalTests: prev.totalTests + 1, streak: prev.streak + 1}));
                    setQuiz({...quiz, isFinished: true, score: newScore});
                }
            };

            if (showSettings) return (
                <div className="min-h-screen flex items-center justify-center bg-zinc-50 p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
                        <Icons.Settings className="w-12 h-12 text-orange-500 mx-auto mb-4"/>
                        <h2 className="text-2xl font-black mb-4">Masha's Settings</h2>
                        <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="Gemini API Key" className="w-full p-4 bg-zinc-50 border rounded-2xl mb-4 focus:outline-none focus:border-orange-500" />
                        <button onClick={() => { localStorage.setItem('masha_api_key', apiKey); setShowSettings(false); }} className="w-full py-4 bg-orange-600 text-white font-bold rounded-2xl">Save & Start</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-white border-b sticky top-0 z-40 p-4">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setQuiz(null)}>
                                <Icons.Heart className="text-orange-500 w-8 h-8 fill-orange-500"/>
                                <span className="text-xl font-black">Masha's</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="bg-orange-50 px-3 py-1 rounded-full text-orange-700 font-bold text-sm flex items-center gap-1"><Icons.Flame className="w-4 h-4"/>{stats.streak}</div>
                                <button onClick={() => setShowSettings(true)}><Icons.Settings className="w-5 h-5 text-zinc-400"/></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 pt-8">
                        {isLoading ? (
                            <div className="text-center py-20"><Icons.Loader2 className="w-12 h-12 animate-spin mx-auto text-orange-500 mb-4"/><p className="font-bold">Masha is thinking...</p></div>
                        ) : quiz ? (
                            <div className="max-w-2xl mx-auto">
                                {!quiz.isFinished ? (
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center text-xs font-bold text-zinc-400 uppercase">
                                            <button onClick={() => setQuiz(null)}><Icons.ArrowLeft className="inline w-3 h-3"/> Exit</button>
                                            <span>{quiz.currentIndex + 1} / {quiz.exercises.length}</span>
                                        </div>
                                        <ExerciseCard exercise={quiz.exercises[quiz.currentIndex]} userAnswer={quiz.answers[quiz.currentIndex] || ''} onAnswerChange={v => setQuiz({...quiz, answers: {...quiz.answers, [quiz.currentIndex]: v}})} isSubmitted={isSubmitted} isCorrect={isSubmitted ? (quiz.answers[quiz.currentIndex]?.toLowerCase().trim() === quiz.exercises[quiz.currentIndex].correctAnswer.toLowerCase().trim()) : null} apiKey={apiKey} />
                                        {!isSubmitted && <RussianKeyboard onKeyPress={k => setQuiz({...quiz, answers: {...quiz.answers, [quiz.currentIndex]: (quiz.answers[quiz.currentIndex] || '') + k}})} onBackspace={() => setQuiz({...quiz, answers: {...quiz.answers, [quiz.currentIndex]: (quiz.answers[quiz.currentIndex] || '').slice(0, -1)}})} />}
                                        <button onClick={() => isSubmitted ? handleNext() : setIsSubmitted(true)} disabled={!quiz.answers[quiz.currentIndex]} className="w-full py-4 bg-zinc-900 text-white font-bold rounded-2xl disabled:opacity-50">{isSubmitted ? 'Next' : 'Check'}</button>
                                    </div>
                                ) : (
                                    <div className="text-center py-12 space-y-6">
                                        <Icons.Trophy className="w-20 h-20 text-orange-500 mx-auto"/>
                                        <h2 className="text-3xl font-black">Quiz Complete!</h2>
                                        <p className="text-zinc-500">You got {quiz.score} / {quiz.exercises.length} correct.</p>
                                        <button onClick={() => setQuiz(null)} className="px-8 py-4 bg-zinc-900 text-white font-bold rounded-2xl">Back to Dashboard</button>
                                    </div>
                                )}
                            </div>
                        ) : activeTab === 'grammar' ? (
                            <GrammarSection />
                        ) : (
                            <div className="space-y-12">
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                    <div className="bg-white p-6 rounded-3xl border flex items-center gap-4"><Icons.Flame className="text-orange-600 w-8 h-8"/><div><div className="text-2xl font-black">{stats.streak}</div><div className="text-[10px] font-bold text-zinc-400 uppercase">Streak</div></div></div>
                                    <div className="bg-white p-6 rounded-3xl border flex items-center gap-4"><Icons.Trophy className="text-blue-600 w-8 h-8"/><div><div className="text-2xl font-black">{stats.totalTests}</div><div className="text-[10px] font-bold text-zinc-400 uppercase">Tests</div></div></div>
                                    <div className="bg-white p-6 rounded-3xl border flex items-center gap-4"><Icons.Medal className="text-emerald-600 w-8 h-8"/><div><div className="text-2xl font-black">{stats.badges.length}</div><div className="text-[10px] font-bold text-zinc-400 uppercase">Badges</div></div></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {ALL_TOPICS.map(t => (
                                        <button key={t} onClick={() => startQuiz(t)} className="p-6 text-left bg-white border-2 rounded-2xl hover:border-orange-500 hover:-translate-y-1 transition-all">
                                            <h3 className="font-bold mb-2">{t}</h3>
                                            <div className="text-xs text-orange-500 font-bold uppercase flex items-center gap-1">Start <Icons.ChevronRight className="w-3 h-3"/></div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around">
                        <button onClick={() => setActiveTab('practice')} className={cn("flex flex-col items-center gap-1", activeTab === 'practice' ? "text-orange-600" : "text-zinc-400")}><Icons.BookOpen className="w-6 h-6"/><span className="text-[10px] font-bold uppercase">Practice</span></button>
                        <button onClick={() => setActiveTab('grammar')} className={cn("flex flex-col items-center gap-1", activeTab === 'grammar' ? "text-orange-600" : "text-zinc-400")}><Icons.Book className="w-6 h-6"/><span className="text-[10px] font-bold uppercase">Grammar</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
