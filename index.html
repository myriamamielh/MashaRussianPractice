<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masha Russian Practice</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f4f5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple Icons Replacement
        const ChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const Settings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(!apiKey);

            const saveApiKey = (e) => {
                e.preventDefault();
                const key = e.target.api_key.value;
                localStorage.setItem('gemini_api_key', key);
                setApiKey(key);
                setShowSettings(false);
            };

            return (
                <div className="min-h-screen bg-zinc-50">
                    <nav className="bg-white border-b border-zinc-200 px-4 py-4">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-extrabold text-orange-600">MASHA RUSSIAN</h1>
                            <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-zinc-100 rounded-full">
                                <Settings />
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto px-4 py-12">
                        {showSettings ? (
                            <div className="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-sm border border-zinc-100">
                                <h2 className="text-2xl font-bold mb-4">Enter Gemini API Key</h2>
                                <form onSubmit={saveApiKey}>
                                    <input 
                                        name="api_key" 
                                        type="password" 
                                        placeholder="Paste key here..." 
                                        className="w-full p-3 border rounded-xl mb-4"
                                        defaultValue={apiKey}
                                    />
                                    <button className="w-full py-3 bg-zinc-900 text-white font-bold rounded-xl">Save & Start</button>
                                </form>
                            </div>
                        ) : (
                            <div className="text-center">
                                <h2 className="text-4xl font-black mb-4">Ready to practice?</h2>
                                <p className="text-zinc-500 mb-8">Choose a topic to begin your Russian lesson.</p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {['Case Endings', 'Verb Conjugation', 'Vocabulary'].map(topic => (
                                        <button key={topic} className="p-6 bg-white border-2 border-zinc-100 rounded-2xl text-left hover:border-orange-500 transition-all flex justify-between items-center group">
                                            <span className="font-bold">{topic}</span>
                                            <ChevronRight />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
